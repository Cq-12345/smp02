materials_domain: thermoset_shape_memory_polymers
representation_scope:
  current: single_small_molecule_smiles_or_molecode
  deferred:
    - commodity_grade_component_mixture
    - polymer_repeat_unit_hypergraph
    - complex_material_hypergraph
target_property:
  name: glass_transition_temperature
  symbol: Tg
  unit: Celsius
  note: "真实目标 Tg 不固定；闭环配置通过 target_tg_c 指定目标温度。"
  example_targets_celsius: [190, 195, 200, 250]
hard_constraints:
  - id: valid_rdkit
    description: "所有候选组分必须能被 RDKit 解析。"
  - id: single_fragment
    description: "当前阶段只接受单一小分子片段，不处理盐、混合物或商品级复配。"
  - id: allowed_atom_set
    description: "元素限制在当前 VAE/MoleCode 可覆盖的常见有机/硅/卤素元素集合内。"
  - id: vae_charset_encodable
    description: "SMILES 必须能被当前 VAE charset 编码。"
  - id: ratio_simplex
    description: "摩尔比例必须非负、满足最小比例阈值，并归一化为 1。"
  - id: reactive_network_ok
    description: "多组分配方必须至少存在合理官能团反应网络。"
priors:
  structural_principles:
    - id: aromatic_backbones_raise_tg
      effect: raises_Tg
      feature: aromatic_backbone
      rationale: "芳香环提高链段刚性，通常提高 Tg。"
    - id: multi_aromatic_rigidity
      effect: raises_Tg
      feature: rigid_multi_aromatic
      rationale: "多芳香结构和联苯/双酚骨架提高刚性和堆积约束。"
    - id: imide_anhydride_networks_raise_tg
      effect: raises_Tg
      feature: imide_or_anhydride
      rationale: "酰亚胺/酸酐路线常形成高刚性、高热稳定性网络。"
    - id: cyanate_ester_triazine
      effect: raises_Tg
      feature: cyanate_ester
      rationale: "氰酸酯三聚生成三嗪网络，常用于高 Tg 热固性体系。"
    - id: maleimide_rigid_network
      effect: raises_Tg
      feature: maleimide
      rationale: "马来酰亚胺结构可参与刚性共聚或 Michael 加成网络。"
    - id: high_functionality_crosslink_density
      effect: raises_Tg
      feature: high_functionality
      rationale: "较高反应官能度通常提高交联密度，从而约束链段运动。"
    - id: flexible_ether_penalty
      effect: lowers_Tg_risk
      feature: flexible_ether_risk
      rationale: "长柔性醚链提高链段活动性，常降低 Tg。"
    - id: peg_like_penalty
      effect: lowers_Tg_risk
      feature: peg_like_risk
      rationale: "PEG-like 片段是低 Tg 或软段风险。"
    - id: long_aliphatic_penalty
      effect: lowers_Tg_risk
      feature: long_aliphatic_risk
      rationale: "长脂肪链降低刚性和玻璃化温度。"
    - id: too_flexible_penalty
      effect: lowers_Tg_risk
      feature: too_flexible_risk
      rationale: "可旋转键过多时，链段自由度提高。"
  applicability_principles:
    - id: ood_distance_penalty
      effect: lowers_model_trust
      feature: high_ood
      rationale: "离训练分布越远，surrogate 预测越应保守。"
    - id: druglike_complexity_penalty
      effect: lowers_transferability
      feature: druglike_hetero_complexity_risk
      rationale: "过多 HBA/HBD 或复杂药物样结构可能不是合理热固性单体。"
    - id: formal_charge_practical_penalty
      effect: lowers_synthesis_priority
      feature: formal_charge_practical_risk
      rationale: "带形式电荷的小分子常有配方和工艺不确定性。"
reaction_principles:
  epoxy_primary_amine:
    groups: [epoxy, primary_amine]
    expected_network: crosslinked_epoxy
    mechanism: nucleophilic_ring_opening
    confidence: high
    notes: "经典环氧-胺固化，适合作为硬约束兼软先验。"
  epoxy_secondary_amine:
    groups: [epoxy, secondary_amine]
    expected_network: crosslinked_epoxy
    mechanism: nucleophilic_ring_opening
    confidence: high
  epoxy_anhydride:
    groups: [epoxy, anhydride]
    expected_network: epoxy_ester_network
    mechanism: catalyzed_ring_opening_esterification
    confidence: medium
    notes: "通常需要催化剂；应作为兼容但工艺条件敏感的反应。"
  epoxy_carboxylic_acid:
    groups: [epoxy, carboxylic_acid]
    expected_network: beta_hydroxy_ester_network
    mechanism: ring_opening_esterification
    confidence: medium
  epoxy_hydroxyl:
    groups: [epoxy, hydroxyl]
    expected_network: etherified_epoxy_network
    mechanism: catalyzed_etherification
    confidence: medium_low
  anhydride_primary_amine:
    groups: [anhydride, primary_amine]
    expected_network: polyamic_acid_or_polyimide_precursor
    mechanism: anhydride_opening_amidation
    confidence: high
  anhydride_secondary_amine:
    groups: [anhydride, secondary_amine]
    expected_network: amic_acid_or_imide_related_network
    mechanism: anhydride_opening_amidation
    confidence: medium
  anhydride_hydroxyl:
    groups: [anhydride, hydroxyl]
    expected_network: polyester_or_half_ester_network
    mechanism: esterification
    confidence: medium
  isocyanate_hydroxyl:
    groups: [isocyanate, hydroxyl]
    expected_network: polyurethane
    mechanism: urethane_formation
    confidence: high
  isocyanate_primary_amine:
    groups: [isocyanate, primary_amine]
    expected_network: polyurea
    mechanism: urea_formation
    confidence: high
  isocyanate_secondary_amine:
    groups: [isocyanate, secondary_amine]
    expected_network: substituted_urea_network
    mechanism: urea_formation
    confidence: high
  acrylate_vinyl_radical:
    groups: [acrylate_or_methacrylate, vinyl]
    expected_network: radical_crosslinked
    mechanism: free_radical_copolymerization
    confidence: medium
  thiol_ene:
    groups: [thiol, vinyl]
    expected_network: thioether_network
    mechanism: thiol_ene_click
    confidence: high
  thiol_acrylate:
    groups: [thiol, acrylate_or_methacrylate]
    expected_network: thioether_ester_network
    mechanism: thiol_michael_or_radical_addition
    confidence: high
  cyanate_ester_self:
    groups: [cyanate_ester, cyanate_ester]
    expected_network: triazine_network
    mechanism: cyclotrimerization
    confidence: high
  cyanate_ester_phenol:
    groups: [cyanate_ester, phenol]
    expected_network: co_cured_cyanate_network
    mechanism: catalyzed_trimerization_or_cocure
    confidence: medium
  cyanate_ester_amine:
    groups: [cyanate_ester, primary_amine]
    expected_network: cyanate_amine_cocured_network
    mechanism: addition_or_cocure
    confidence: medium_low
  maleimide_vinyl:
    groups: [maleimide, vinyl]
    expected_network: maleimide_copolymer_network
    mechanism: copolymerization_or_addition
    confidence: medium
  maleimide_thiol:
    groups: [maleimide, thiol]
    expected_network: thiosuccinimide_network
    mechanism: michael_addition
    confidence: high
  maleimide_amine:
    groups: [maleimide, primary_amine]
    expected_network: amino_succinimide_network
    mechanism: aza_michael_addition
    confidence: medium
candidate_sources:
  library:
    description: "SMP_Dataset.xlsx 中已经出现的单体。"
    trust_level: high
  generated:
    description: "由热固性结构模板生成的小分子候选。"
    trust_level: medium
  chembl:
    description: "ChEMBL 化合物经 RDKit、元素、charset、官能团和适用域筛选后进入候选池。"
    trust_level: low_to_medium
literature_sources:
  teimouri_2024_ml_smp:
    source_type: paper
    local_file: "paper/Journal of Polymer Science - 2024 - Teimouri - Machine Learning‐Driven Discovery of Thermoset Shape Memory Polymers With.pdf"
    evidence_scope:
      - tl_vae_wvcm_predictor
      - functional_group_pairing_forward_design
      - 190_200_c_target_design
    notes: "本项目复现的主论文；提供工作流、目标窗口和数据集背景。"
  teimouri_2024_supplement:
    source_type: supplementary_information
    local_file: "paper/pol20241095-sup-0001-supinfo.docx"
    evidence_scope:
      - model_hyperparameters
      - dataset_context
    notes: "补充材料用于复现超参数和数据背景。"
  chembl_36:
    source_type: database
    local_file: "data/chembl_36_chemreps.txt"
    evidence_scope:
      - external_molecule_pool
      - vae_pretraining_domain
    notes: "ChEMBL 是外部候选池，不等价于 SMP 实验事实。"
  local_functional_group_rules:
    source_type: curated_rule_set
    local_file: "docs/functional_group_classification_and_matching.md"
    evidence_scope:
      - smarts_functional_groups
      - reaction_compatibility_harness
    notes: "由于主论文未公开完整 SMARTS/兼容性矩阵，本项目维护可审计的本地规则。"
  candidate_source_registry:
    source_type: local_registry
    local_file: "trail/candidates/source_registry.yaml"
    evidence_scope:
      - candidate_source_authority
      - sparse_functional_group_audit
    notes: "候选来源、权威等级和稀疏官能团扩展优先级。"
process_condition_templates:
  epoxy_amine_thermal_cure:
    trigger: thermal
    catalyst: optional_accelerator
    cure_schedule_fields:
      - mix_temperature_c
      - cure_temperature_c
      - cure_time_h
      - post_cure_temperature_c
      - post_cure_time_h
    notes: "环氧-胺体系通常对当量比、升温程序和后固化敏感。"
  epoxy_anhydride_catalyzed_cure:
    trigger: thermal
    catalyst: tertiary_amine_or_imidazole_optional
    cure_schedule_fields:
      - catalyst_loading
      - cure_temperature_c
      - post_cure_temperature_c
    notes: "环氧-酸酐常需要催化剂；缺少催化剂时应降低工艺置信度。"
  anhydride_amine_imidization:
    trigger: thermal_or_solution_imidization
    catalyst: optional
    cure_schedule_fields:
      - solvent
      - imidization_temperature_c
      - imidization_time_h
    notes: "酸酐-胺路线可能先形成聚酰胺酸/酰胺酸，再进一步酰亚胺化。"
  isocyanate_urethane_urea:
    trigger: ambient_or_thermal
    catalyst: tin_or_amine_optional
    cure_schedule_fields:
      - moisture_control
      - nco_index
      - cure_temperature_c
    notes: "异氰酸酯体系对水分、NCO 指数和催化剂敏感。"
  radical_vinyl_cure:
    trigger: thermal_or_photo_radical
    catalyst: peroxide_or_photoinitiator
    cure_schedule_fields:
      - initiator_type
      - initiator_loading
      - irradiation_or_cure_temperature_c
    notes: "自由基体系必须记录引发剂和光/热触发方式。"
  thiol_click_cure:
    trigger: base_photo_or_radical
    catalyst: base_or_photoinitiator_optional
    cure_schedule_fields:
      - thiol_ene_stoichiometry
      - catalyst_or_initiator
      - cure_temperature_c
    notes: "thiol-ene/thiol-acrylate 对化学计量、碱/光引发和氧阻聚条件敏感。"
  cyanate_ester_triazine_cure:
    trigger: high_temperature_thermal
    catalyst: metal_or_phenolic_catalyst_optional
    cure_schedule_fields:
      - trimerization_temperature_c
      - catalyst_loading
      - post_cure_temperature_c
    notes: "氰酸酯常需高温三聚或催化；工艺条件对最终 Tg 影响很大。"
  maleimide_addition_or_copolymerization:
    trigger: thermal_or_michael_addition
    catalyst: base_or_radical_optional
    cure_schedule_fields:
      - cure_temperature_c
      - co_reactant_stoichiometry
      - post_cure_temperature_c
    notes: "马来酰亚胺可以 Michael 加成或共聚，需记录共反应物和触发方式。"
reaction_evidence_map:
  epoxy_primary_amine: {evidence_sources: [local_functional_group_rules], process_template: epoxy_amine_thermal_cure}
