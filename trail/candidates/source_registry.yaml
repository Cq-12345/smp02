registry_name: smp_candidate_component_sources
version: 1
representation_scope: single_small_molecule_smiles_or_molecode
deferred:
  - commodity_grade_component_hypergraph
  - polymer_repeat_unit_hypergraph
sources:
  library:
    source_type: literature_dataset
    authority_level: 4
    provenance:
      - data/SMP_Dataset.xlsx
      - paper/Journal of Polymer Science - 2024 - Teimouri - Machine Learning‐Driven Discovery of Thermoset Shape Memory Polymers With.pdf
      - paper/pol20241095-sup-0001-supinfo.docx
    role: Monomers appearing in the SMP dataset used for model reproduction and candidate discovery.
    trust_notes: Highest current source authority because these molecules are tied to the local Tg dataset.
    expected_use:
      - supervised_training
      - candidate_anchor
      - functional_group_statistics
  generated:
    source_type: rule_template_seed
    authority_level: 2
    provenance:
      - src/smp02/agent_discovery.py::GENERATED_MONOMER_SEEDS
      - docs/functional_group_classification_and_matching.md
    role: Thermoset-inspired small-molecule seeds used to expand sparse but important functional groups.
    trust_notes: Chemically motivated but not observed Tg labels; must pass RDKit, ratio, reaction, predictor, and Harness checks.
    expected_use:
      - search_space_bootstrap
      - sparse_functional_group_augmentation
      - generation_prompt_examples
  chembl:
    source_type: database_screen
    authority_level: 1
    provenance:
      - data/chembl_36_chemreps.txt
    role: External molecule pool screened into small-molecule candidates by allowed atoms, one-fragment, reactive group, and size filters.
    trust_notes: Broad database source; many molecules are drug-like and may be poor thermoset monomer hypotheses.
    expected_use:
      - novelty_pool
      - ood_probe
      - replacement_pool
  generation_record:
    source_type: generated_hypothesis_ledger
    authority_level: 1
    provenance:
      - trail/generation/generation_record_schema.yaml
      - artifacts/trail/generation/prompt_records/generation_record_ledger.csv
      - artifacts/trail/generation/replacement_eval/replacement_observation_ledger.csv
    role: Candidate formulations generated by VAE replacement, prompt/RAG, future LLM/SFT, or future diffusion/flow generators.
    trust_notes: Hypotheses only; accepted records still require predictor/Harness/PiEvo review and later real or high-fidelity observation.
    expected_use:
      - closed_loop_generation
      - failure_feedback
      - posterior_warm_start
functional_group_priorities:
  sparse_high_value:
    - cyanate_ester
    - maleimide
    - isocyanate
    - anhydride
    - thiol
  common_anchor:
    - aromatic
    - ether
    - ester
    - primary_amine
    - hydroxyl
    - epoxy
audit:
  minimum_registry_coverage: 1
  sparse_group_threshold: 15
  notes: >
    Sparse high-value groups should be expanded first by mining SMP papers or
    adding curated rule-template seeds, while broad ChEMBL candidates should
    remain low-authority until validated.
