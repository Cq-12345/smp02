scope:
  current_representation: single_small_molecule_smiles_or_molecode
  deferred_representation:
    - commodity_component_hypergraph
    - polymer_repeat_unit_graph
target:
  variable_target_tg_c: true
  reward_form: exp_negative_absolute_target_distance
strategies:
  rule_template:
    maturity: implemented
    generator: src/smp02/agent_discovery.py::GENERATED_MONOMER_SEEDS
    harness_required: true
    best_use: seed chemically plausible thermoset monomers
  functional_group_replacement:
    maturity: implemented
    generator: trail/generation/vae_replacement_strategy.py + scripts/evaluate_replacement_proposals.py
    harness_required: true
    best_use: local exploration around high-scoring formulations
    feedback_guided_mode:
      cli_flag: --require-counterpart-compatibility
      constraint: replacement must preserve a mapped complementary reactive pair with the unchanged co-monomer
      audit_fields:
        - counterpart_groups
        - counterpart_compatibility_reason
        - feedback_constraint
      outputs:
        - artifacts/trail/generation/feedback_guided_replacement_proposals.csv
        - artifacts/trail/generation/feedback_guided_replacement_eval/replacement_eval_summary.json
        - artifacts/trail/generation/expanded_inventory_replacement_proposals.csv
        - artifacts/trail/generation/expanded_inventory_replacement_eval/replacement_eval_summary.json
        - artifacts/pievo_faithful_feedback_replacement_195_smoke/pievo_faithful_summary.json
        - artifacts/trail/generation/feedback_guided_replacement_pievo_compare/pievo_feedback_ledger_comparison.json
        - artifacts/trail/generation/feedback_guided_replacement_target_sweep/feedback_replacement_target_sweep_summary.json
        - artifacts/pievo_faithful_feedback_replacement_target_sweep/target_195/pievo_faithful_summary.json
        - reports/feedback_guided_replacement_comparison.md
        - reports/feedback_guided_replacement_pievo_comparison.md
        - reports/feedback_guided_replacement_target_sweep.md
        - reports/expanded_inventory_replacement_evaluation.md
      expanded_inventory_mode:
        cli_flag: --component-inventory artifacts/trail/candidates_expanded/component_inventory.csv
        replacement_pool: artifacts/trail/candidates_expanded/component_inventory.csv
        provenance_fields:
          - replacement_source
          - replacement_label
          - replacement_template_family
          - replacement_template_intended_group
        literature_template_scored: 29
        literature_template_harness_pass: 3
  vae_latent_local_search:
    maturity: planned
    generator: future
    harness_required: true
    best_use: local decode around high-reward latent neighborhoods
  llm_rag_principle_generation:
    maturity: feedback_aware_agent_implemented
    generator: scripts/build_prompt_generation_records.py + scripts/run_feedback_aware_llm_rag_agent.py
    harness_required: true
    best_use: propose new principles or functional group combinations from anomalies
    feedback_aware_mode:
      provider_default: offline_policy
      optional_provider: openai_compatible
      policy_input: artifacts/trail/generation_feedback_strict/strategy_feedback.csv
      rag_context_default_docs:
        - trail/generation/generation_strategy_registry.yaml
        - reports/generation_failure_feedback_strict.md
        - docs/pievo_faithful_smp.md
        - reports/feedback_guided_replacement_target_sweep.md
        - reports/sparse_candidate_template_expansion.md
        - reports/candidate_source_audit_expanded.md
        - reports/expanded_inventory_replacement_evaluation.md
        - trail/knowledge/smp_prior_knowledge.yaml
      outputs:
        - artifacts/trail/generation/feedback_aware_llm_rag/generation_record_ledger.csv
        - artifacts/trail/generation/feedback_aware_llm_rag/feedback_aware_policy.json
        - artifacts/trail/generation/feedback_aware_llm_rag_observations/generation_observation_ledger.csv
        - artifacts/pievo_faithful_feedback_aware_llm_rag_195_smoke/pievo_faithful_summary.json
        - artifacts/trail/generation/expanded_inventory_feedback_aware_llm_rag/generation_record_ledger.csv
        - reports/feedback_aware_llm_rag_agent.md
        - reports/feedback_aware_llm_rag_pievo_feedback.md
        - reports/expanded_inventory_feedback_aware_llm_rag_agent.md
      expanded_inventory_context:
        replacement_scored: artifacts/trail/generation/expanded_inventory_replacement_eval/replacement_proposals_scored.csv
        preferred_replacement_source: literature_template
        literature_template_context_rows: 1
      pievo_bridge:
        importer: scripts/import_generation_ledger_observations.py
        config: configs/pievo_faithful_feedback_aware_llm_rag_195_smoke.yaml
        source_type: surrogate
        accepted_observations: 2
        pievo_rounds: 6
  llm_smiles_generation:
    maturity: draft_record_contract_implemented
    generator: scripts/build_prompt_generation_records.py
    harness_required: true
    best_use: draft candidates only; never trust without RDKit and reaction validation
  sft_candidate_generator:
    maturity: deferred
    generator: future_internal_sft
    harness_required: true
    best_use: only after enough validated generation records
  diffusion_or_flow_matching:
    maturity: deferred
    generator: future
    harness_required: true
    best_use: not prioritized until larger molecule/polymer dataset exists
record_schema:
  schema_path: trail/generation/generation_record_schema.yaml
  importer: trail/generation/import_generation_records.py
  smoke_runner: scripts/build_prompt_generation_records.py
  smoke_outputs:
    - artifacts/trail/generation/prompt_records/prompt_generation_records_input.csv
    - artifacts/trail/generation/prompt_records/generation_record_ledger.csv
    - artifacts/trail/generation/prompt_records/generation_record_summary.json
    - artifacts/trail/generation/prompt_records/prompt_rag_packet.md
  required_fields:
    - generation_id
    - strategy
    - stage
    - target_tg_c
    - target_window_c
    - candidate_smiles
    - candidate_ratios
    - source_context
  recommended_audit_fields:
    - prompt_id
    - prompt_text
    - prompt_hash
    - rag_query
    - rag_context_refs
    - rag_context_digest
    - principle_hypothesis
    - functional_group_plan
    - candidate_json
    - harness_pass
    - harness_failure_reason
    - predicted_tg_mean_c
    - predicted_tg_sigma_c
    - ood_penalty
    - pievo_round
    - selected_by_ids
