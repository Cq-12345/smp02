scope:
  current_representation: single_small_molecule_smiles_or_molecode
  deferred_representation:
    - commodity_component_hypergraph
    - polymer_repeat_unit_graph
target:
  variable_target_tg_c: true
  reward_form: exp_negative_absolute_target_distance
strategy_policy:
  maturity: contextual_bandit_policy_implemented
  updater: scripts/update_generation_strategy_policy.py
  policy_type: strategy_level_contextual_bandit_with_ucb_exploration
  objective: allocate next-round proposal budget across generator strategies while preserving predictor/Harness/PiEvo gates
  outputs:
    - artifacts/trail/generation_strategy_policy/generation_strategy_bandit_policy.csv
    - artifacts/trail/generation_strategy_policy/generation_strategy_bandit_summary.json
    - reports/generation_strategy_bandit_policy.md
  current_summary:
    top_strategy: llm_rag_principle_generation
    eligible_active_strategies: 5
    suppressed_strategies: 1
    data_collection_only_strategies: 0
    total_attempts: 571
    total_budget: 100
  guardrails:
    - llm_smiles_generation remains suppressed until predictor and chemistry evidence are present
    - sft_candidate_generator is active only after SFT readiness passes and still stays behind predictor/Harness/PiEvo gates
    - diffusion_or_flow_matching gets no training/generation budget until seed-table readiness gate passes
    - allocation_per_100 is a proposal-budget hint, not a final formulation recommendation
strategies:
  rule_template:
    maturity: implemented
    generator: src/smp02/agent_discovery.py::GENERATED_MONOMER_SEEDS
    harness_required: true
    best_use: seed chemically plausible thermoset monomers
    generation_records:
      script: scripts/build_rule_template_generation_records.py
      source: artifacts/reproduce/discovery/selected_candidates.csv
      records: 50
      harness_pass: 50
      best_distance_c: 0.0031802513673540034
      mean_generation_reward: 0.9887598357832142
      note: rule/template baseline seeds from current selected candidate space; surrogate evidence only
      outputs:
        - artifacts/trail/generation/rule_template_records/rule_template_generation_records_input.csv
        - artifacts/trail/generation/rule_template_records/generation_record_ledger.csv
        - artifacts/trail/generation/rule_template_records/generation_record_summary.json
        - reports/rule_template_generation_records.md
  functional_group_replacement:
    maturity: implemented
    generator: trail/generation/vae_replacement_strategy.py + scripts/evaluate_replacement_proposals.py
    harness_required: true
    best_use: local exploration around high-scoring formulations
    feedback_guided_mode:
      cli_flag: --require-counterpart-compatibility
      constraint: replacement must preserve a mapped complementary reactive pair with the unchanged co-monomer
      audit_fields:
        - counterpart_groups
        - counterpart_compatibility_reason
        - feedback_constraint
      outputs:
        - artifacts/trail/generation/feedback_guided_replacement_proposals.csv
        - artifacts/trail/generation/feedback_guided_replacement_eval/replacement_eval_summary.json
        - artifacts/trail/generation/expanded_inventory_replacement_proposals.csv
        - artifacts/trail/generation/expanded_inventory_replacement_eval/replacement_eval_summary.json
        - artifacts/trail/generation/expanded_inventory_replacement_records/generation_record_ledger.csv
        - artifacts/pievo_faithful_feedback_replacement_195_smoke/pievo_faithful_summary.json
        - artifacts/trail/generation/feedback_guided_replacement_pievo_compare/pievo_feedback_ledger_comparison.json
        - artifacts/trail/generation/feedback_guided_replacement_target_sweep/feedback_replacement_target_sweep_summary.json
        - artifacts/pievo_faithful_feedback_replacement_target_sweep/target_195/pievo_faithful_summary.json
        - reports/feedback_guided_replacement_comparison.md
        - reports/feedback_guided_replacement_pievo_comparison.md
        - reports/feedback_guided_replacement_target_sweep.md
        - reports/expanded_inventory_replacement_evaluation.md
        - reports/expanded_inventory_replacement_generation_records.md
      expanded_inventory_mode:
        cli_flag: --component-inventory artifacts/trail/candidates_expanded/component_inventory.csv
        replacement_pool: artifacts/trail/candidates_expanded/component_inventory.csv
        provenance_fields:
          - replacement_source
          - replacement_label
          - replacement_template_family
          - replacement_template_intended_group
        literature_template_scored: 29
        literature_template_harness_pass: 3
  vae_latent_local_search:
    maturity: decoder_free_inventory_search_implemented
    generator: trail/generation/vae_latent_local_search.py + scripts/evaluate_replacement_proposals.py
    harness_required: true
    best_use: retrieve VAE-latent-nearest replacement monomers around high-reward formulations without claiming decoder novelty
    mode:
      cli_flag: --require-counterpart-compatibility
      search_space: artifacts/trail/candidates_expanded/component_inventory.csv
      latent_encoder: artifacts/reproduce/vae/finetuned_latent_512.pt
      distance: euclidean_distance_between_single-monomer_VAE_mu_vectors
      constraint: replacement must share at least one source-side functional group and preserve a mapped complementary reactive pair with the unchanged co-monomer
      decoder_claim: false
      audit_fields:
        - latent_distance
        - latent_cosine_similarity
        - latent_rank
        - latent_search_space_rows
        - latent_compatible_rows
        - matched_groups
        - tanimoto
      outputs:
        - artifacts/trail/generation/vae_latent_local_search/latent_local_search_proposals.csv
        - artifacts/trail/generation/vae_latent_local_search/latent_local_search_summary.json
        - artifacts/trail/generation/vae_latent_local_search_eval/replacement_eval_summary.json
        - artifacts/trail/generation/vae_latent_local_search_records/generation_record_ledger.csv
        - artifacts/trail/generation/vae_latent_local_search_eval/replacement_observation_ledger.csv
        - artifacts/pievo_faithful_vae_latent_local_search_195_smoke/pievo_faithful_summary.json
        - reports/vae_latent_local_search.md
        - reports/vae_latent_local_search_evaluation.md
        - reports/vae_latent_local_search_generation_records.md
        - reports/vae_latent_local_search_pievo_feedback.md
      smoke_result:
        proposals: 200
        rebuilt_formulas: 200
        harness_pass: 42
        literature_template_proposals: 39
        literature_template_harness_pass: 7
        best_distance_c: 0.20046
        pievo_external_observations: 42
        pievo_best_selected_distance_c: 0.059032
  llm_rag_principle_generation:
    maturity: feedback_aware_agent_implemented
    generator: scripts/build_prompt_generation_records.py + scripts/run_feedback_aware_llm_rag_agent.py
    harness_required: true
    best_use: propose new principles or functional group combinations from anomalies
    feedback_aware_mode:
      provider_default: offline_policy
      optional_provider: openai_compatible
      policy_input: artifacts/trail/generation_feedback_strict/strategy_feedback.csv
      rag_context_default_docs:
        - trail/generation/generation_strategy_registry.yaml
        - reports/generation_failure_feedback_strict.md
        - docs/pievo_faithful_smp.md
        - reports/feedback_guided_replacement_target_sweep.md
        - reports/sparse_candidate_template_expansion.md
        - reports/candidate_source_audit_expanded.md
        - reports/expanded_inventory_replacement_evaluation.md
        - trail/knowledge/smp_prior_knowledge.yaml
      outputs:
        - artifacts/trail/generation/feedback_aware_llm_rag/generation_record_ledger.csv
        - artifacts/trail/generation/feedback_aware_llm_rag/feedback_aware_policy.json
        - artifacts/trail/generation/feedback_aware_llm_rag_observations/generation_observation_ledger.csv
        - artifacts/pievo_faithful_feedback_aware_llm_rag_195_smoke/pievo_faithful_summary.json
        - artifacts/trail/generation/expanded_inventory_feedback_aware_llm_rag/generation_record_ledger.csv
        - reports/feedback_aware_llm_rag_agent.md
        - reports/feedback_aware_llm_rag_pievo_feedback.md
        - reports/expanded_inventory_feedback_aware_llm_rag_agent.md
      expanded_inventory_context:
        replacement_scored: artifacts/trail/generation/expanded_inventory_replacement_eval/replacement_proposals_scored.csv
        preferred_replacement_source: literature_template
        literature_template_context_rows: 1
      pievo_bridge:
        importer: scripts/import_generation_ledger_observations.py
        config: configs/pievo_faithful_feedback_aware_llm_rag_195_smoke.yaml
        source_type: surrogate
        accepted_observations: 2
        pievo_rounds: 6
  llm_smiles_generation:
    maturity: draft_record_contract_implemented
    generator: scripts/build_prompt_generation_records.py
    harness_required: true
    best_use: draft candidates only; never trust without RDKit and reaction validation
  sft_candidate_generator:
    maturity: dry_run_generator_implemented
    generator: scripts/build_generative_training_sets.py + scripts/run_sft_candidate_generator_dry_run.py
    harness_required: true
    best_use: SFT dry-run/training with auditable generation_record JSONL, followed by predictor/Harness/PiEvo validation
    training_corpus:
      jsonl: artifacts/trail/generation/generative_training_sets/sft_generation_records.jsonl
      summary: artifacts/trail/generation/generative_training_sets/generative_training_summary.json
      examples: 143
      train_examples: 124
      eval_examples: 19
      readiness_gate_pass: true
      min_examples: 20
      source_ledgers:
        - artifacts/trail/generation/rule_template_records/generation_record_ledger.csv
        - artifacts/trail/generation/prompt_records/generation_record_ledger.csv
        - artifacts/trail/generation/feedback_aware_llm_rag/generation_record_ledger.csv
        - artifacts/trail/generation/expanded_inventory_feedback_aware_llm_rag/generation_record_ledger.csv
        - artifacts/trail/generation/original_replacement_records/generation_record_ledger.csv
        - artifacts/trail/generation/feedback_guided_replacement_records/generation_record_ledger.csv
        - artifacts/trail/generation/vae_latent_local_search_records/generation_record_ledger.csv
        - artifacts/trail/generation/expanded_inventory_replacement_records/generation_record_ledger.csv
        - artifacts/trail/generation/feedback_guided_replacement_target_records/target_190/generation_record_ledger.csv
        - artifacts/trail/generation/feedback_guided_replacement_target_records/target_195/generation_record_ledger.csv
        - artifacts/trail/generation/feedback_guided_replacement_target_records/target_200/generation_record_ledger.csv
        - artifacts/trail/generation/feedback_guided_replacement_target_records/target_250/generation_record_ledger.csv
    dry_run:
      mode: prototype_replay_not_weight_update
      script: scripts/run_sft_candidate_generator_dry_run.py
      records: 25
      harness_pass: 25
      best_distance_c: 0.0031802513673540034
      mean_generation_reward: 0.9921940687487707
      heldout_eval_rows: 19
      heldout_exact_candidate_matches: 0
      outputs:
        - artifacts/trail/generation/sft_candidate_dry_run/sft_candidate_records_input.csv
        - artifacts/trail/generation/sft_candidate_dry_run/generation_record_ledger.csv
        - artifacts/trail/generation/sft_candidate_dry_run/generation_record_summary.json
        - artifacts/trail/generation/sft_candidate_dry_run/heldout_eval_retrieval.csv
        - reports/sft_candidate_generator_dry_run.md
  diffusion_or_flow_matching:
    maturity: seed_table_ready_for_dry_run_or_training
    generator: scripts/build_generative_training_sets.py
    harness_required: true
    best_use: train or dry-run conditional diffusion/flow only after all generated records are revalidated by predictor/Harness/PiEvo
    training_seed_table:
      table: artifacts/trail/generation/generative_training_sets/diffusion_flow_seed_table.csv
      summary: artifacts/trail/generation/generative_training_sets/generative_training_summary.json
      seed_rows: 143
      train_rows: 124
      eval_rows: 19
      readiness_gate_pass: true
      min_examples: 100
      next_data_needed: 0
