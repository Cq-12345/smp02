seed: 42
device: cuda
data_path: data/SMP_Dataset.xlsx
chembl_path: data/chembl_36_chemreps.txt
output_dir: artifacts/smoke

smiles:
  max_length: 204
  min_charset_size: 55
  augment_per_monomer: 8
  augmented_limit: 512

vae:
  latent_sizes: [16, 64]
  batch_size: 256
  pretrain_epochs: 1
  finetune_epochs: 1
  learning_rate: 0.0001
  reconstruction_weight: 1.0
  kl_weight: 1.0
  validity_weight: 0.1
  chembl_limit: 2048
  num_workers: 2

predictors:
  test_size: 0.15
  pcp_tolerance: 0.15
  selection_metric: R2 test
  selection_higher_is_better: true
  cnn_epochs: 3
  cnn_batch_size: 16
  cnn_learning_rate: 0.00001
  cnn_weight_decay: 0.001
  rf_estimators: 20
  model_zoo_rf_large_estimators: 50
  svr_c: 1000.0
  svr_epsilon: 1.0
  svr_kernel: rbf

discovery:
  latent_size: 64
  predictor: best
  target_tg_min: 190.0
  target_tg_max: 200.0
  ratio_start: 0.05
  ratio_stop: 0.95
  ratio_step: 0.10
  max_candidates: 50

closed_loop:
  iterations: 2
  top_k: 10
  uncertainty_weight: 0.2
  target_center: 195.0
